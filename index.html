<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Budget · THB</title>
  <style>
    :root {
      --bg: #0a0f1e;
      --surface: #131929;
      --surface2: #1e2a40;
      --surface3: #263350;
      --border: #2d3f60;
      --border-light: #374a6e;
      --text: #e8edf8;
      --text-muted: #7a8fad;
      --text-dim: #4a5a78;
      --income: #22c55e;
      --income-bg: rgba(34,197,94,0.1);
      --expense: #f43f5e;
      --expense-bg: rgba(244,63,94,0.1);
      --accent: #6366f1;
      --accent2: #818cf8;
      --accent-bg: rgba(99,102,241,0.12);
      --warning: #f59e0b;
      --warning-bg: rgba(245,158,11,0.12);
      --paid: #22c55e;
      --unpaid: #f43f5e;
      --radius: 16px;
      --radius-sm: 10px;
      --radius-xs: 6px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding-bottom: 80px;
    }

    /* ── Header ── */
    .app-header {
      background: linear-gradient(135deg, #131929 0%, #1a2540 100%);
      border-bottom: 1px solid var(--border);
      padding: 20px 20px 0;
      position: sticky; top: 0; z-index: 100;
    }
    .header-top {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 16px;
    }
    .header-top h1 { font-size: 1.3rem; font-weight: 700; letter-spacing: -0.02em; }
    .header-top h1 span { color: var(--accent2); }
    .header-actions { display: flex; gap: 8px; }
    .icon-btn {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius-xs); color: var(--text-muted);
      padding: 6px 10px; font-size: 0.8rem; cursor: pointer;
      transition: all 0.15s;
    }
    .icon-btn:hover { color: var(--text); border-color: var(--accent); }

    /* ── Tabs ── */
    .tabs {
      display: flex; gap: 2px;
    }
    .tab {
      flex: 1; padding: 10px 4px 12px;
      background: none; border: none; border-bottom: 2px solid transparent;
      color: var(--text-muted); font-size: 0.78rem; font-weight: 600;
      cursor: pointer; transition: all 0.15s; text-align: center;
      letter-spacing: 0.02em;
    }
    .tab.active { color: var(--accent2); border-bottom-color: var(--accent2); }

    /* ── Pages ── */
    .page { display: none; padding: 16px; }
    .page.active { display: block; }

    /* ── Warnings ── */
    .warn-item {
      border-radius: var(--radius-sm); padding: 10px 14px;
      font-size: 0.83rem; display: flex; align-items: flex-start;
      gap: 8px; margin-bottom: 8px; line-height: 1.4;
    }
    .warn-item.red    { background: rgba(244,63,94,0.1);  border: 1px solid rgba(244,63,94,0.3);  color: #fca5a5; }
    .warn-item.yellow { background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.3); color: #fcd34d; }

    /* ── Dashboard Cards ── */
    .dash-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 10px; margin-bottom: 16px;
    }
    .dash-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px; position: relative; overflow: hidden;
    }
    .dash-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0;
      height: 2px;
    }
    .dash-card.balance-card::before  { background: linear-gradient(90deg, var(--accent), var(--accent2)); }
    .dash-card.savings-card::before  { background: linear-gradient(90deg, var(--income), #86efac); }
    .dash-card.income-card::before   { background: var(--income); }
    .dash-card.expense-card::before  { background: var(--expense); }

    .dash-card .card-icon {
      font-size: 1.2rem; margin-bottom: 8px; display: block;
    }
    .dash-card .card-label {
      font-size: 0.7rem; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px;
    }
    .dash-card .card-amount {
      font-size: 1.15rem; font-weight: 700; letter-spacing: -0.02em;
      word-break: break-all;
    }
    .dash-card .card-sub {
      font-size: 0.7rem; color: var(--text-muted); margin-top: 4px;
    }
    .balance-card .card-amount { color: var(--text); }
    .income-card  .card-amount { color: var(--income); }
    .expense-card .card-amount { color: var(--expense); }
    .savings-card .card-amount { color: var(--income); }
    .savings-card .card-amount.behind   { color: var(--warning); }
    .savings-card .card-amount.negative { color: var(--expense); }

    .mini-bar { height: 3px; background: var(--surface2); border-radius: 2px; margin-top: 8px; overflow: hidden; }
    .mini-bar-fill { height: 100%; border-radius: 2px; transition: width 0.4s ease; }
    .mini-bar-fill.ok       { background: var(--income); }
    .mini-bar-fill.behind   { background: var(--warning); }
    .mini-bar-fill.negative { background: var(--expense); }

    /* ── Section Blocks ── */
    .block {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); margin-bottom: 14px; overflow: hidden;
    }
    .block-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px; cursor: pointer; user-select: none;
    }
    .block-header h3 { font-size: 0.9rem; font-weight: 600; }
    .block-meta { font-size: 0.78rem; color: var(--text-muted); }
    .block-chevron {
      color: var(--text-dim); font-size: 0.8rem;
      transition: transform 0.2s; margin-left: 8px;
    }
    .block-chevron.open { transform: rotate(180deg); }
    .block-body { padding: 0 16px 16px; display: none; }
    .block-body.open { display: block; }

    /* ── Fixed Cost Items ── */
    .fixed-item {
      display: flex; align-items: center;
      border-radius: var(--radius-sm);
      padding: 12px 14px; margin-bottom: 8px;
      border: 1px solid var(--border);
      background: var(--surface2);
      transition: opacity 0.2s;
      gap: 12px;
    }
    .fixed-item.paid-item {
      background: rgba(34,197,94,0.04);
      border-color: rgba(34,197,94,0.2);
      opacity: 0.75;
    }
    .fixed-item-icon {
      width: 38px; height: 38px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; flex-shrink: 0;
      background: var(--surface3);
    }
    .fixed-item.paid-item .fixed-item-icon {
      background: rgba(34,197,94,0.12);
    }
    .fixed-item-info { flex: 1; min-width: 0; }
    .fixed-item-name {
      font-size: 0.88rem; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .fixed-item.paid-item .fixed-item-name {
      text-decoration: line-through; color: var(--text-muted);
    }
    .fixed-item-cat { font-size: 0.72rem; color: var(--text-muted); margin-top: 2px; }
    .fixed-item-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .fixed-amount { font-size: 0.9rem; font-weight: 700; color: var(--expense); }
    .fixed-item.paid-item .fixed-amount { color: var(--text-muted); }

    .pay-btn {
      padding: 5px 10px; border-radius: var(--radius-xs);
      font-size: 0.72rem; font-weight: 600; cursor: pointer;
      border: 1px solid; transition: all 0.15s; white-space: nowrap;
    }
    .pay-btn.unpaid {
      background: var(--expense-bg); border-color: rgba(244,63,94,0.4);
      color: var(--expense);
    }
    .pay-btn.unpaid:hover { background: rgba(244,63,94,0.2); }
    .pay-btn.is-paid {
      background: var(--income-bg); border-color: rgba(34,197,94,0.4);
      color: var(--income);
    }
    .pay-btn.is-paid:hover { background: rgba(244,63,94,0.1); border-color: rgba(244,63,94,0.3); color: var(--expense); }

    .del-btn {
      background: none; border: none; color: var(--text-dim);
      cursor: pointer; font-size: 0.9rem; padding: 4px;
      border-radius: 4px; transition: color 0.15s; line-height: 1;
    }
    .del-btn:hover { color: var(--expense); }

    /* Fixed cost payment progress */
    .fixed-progress {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 16px; background: var(--surface2);
      border-bottom: 1px solid var(--border); font-size: 0.8rem;
    }
    .fixed-progress-dots { display: flex; gap: 4px; flex: 1; }
    .fixed-dot {
      height: 6px; border-radius: 3px; flex: 1;
      background: var(--surface3); transition: background 0.2s;
    }
    .fixed-dot.paid { background: var(--income); }
    .fixed-progress-label { color: var(--text-muted); white-space: nowrap; }

    /* ── Limit items ── */
    .limit-item { margin-bottom: 16px; }
    .limit-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
    .limit-label { font-size: 0.85rem; font-weight: 500; }
    .limit-nums { font-size: 0.75rem; }
    .limit-bar { height: 7px; background: var(--surface2); border-radius: 4px; overflow: hidden; margin-bottom: 8px; }
    .limit-bar-fill { height: 100%; border-radius: 4px; transition: width 0.3s; }
    .limit-bar-fill.ok   { background: linear-gradient(90deg, #16a34a, var(--income)); }
    .limit-bar-fill.warn { background: linear-gradient(90deg, #d97706, var(--warning)); }
    .limit-bar-fill.over { background: linear-gradient(90deg, #be123c, var(--expense)); }
    .limit-input-row { display: flex; gap: 6px; }
    .limit-input-row input {
      flex: 1; background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius-xs); color: var(--text);
      padding: 6px 10px; font-size: 0.82rem; outline: none;
    }
    .limit-input-row input:focus { border-color: var(--accent); }
    .set-btn {
      padding: 6px 14px; background: var(--accent-bg);
      border: 1px solid rgba(99,102,241,0.3); border-radius: var(--radius-xs);
      color: var(--accent2); font-size: 0.78rem; font-weight: 600; cursor: pointer;
    }
    .set-btn:hover { background: rgba(99,102,241,0.2); }

    /* ── Goal row ── */
    .goal-row {
      display: flex; align-items: center; gap: 8px;
      padding: 12px 0 0;
    }
    .goal-row label { font-size: 0.8rem; color: var(--text-muted); white-space: nowrap; }
    .goal-row input {
      flex: 1; background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius-xs); color: var(--text);
      padding: 7px 10px; font-size: 0.85rem; outline: none;
    }
    .goal-row input:focus { border-color: var(--accent); }
    .goal-row button {
      padding: 7px 16px; background: var(--accent);
      border: none; border-radius: var(--radius-xs);
      color: white; font-size: 0.82rem; font-weight: 600; cursor: pointer;
    }
    .goal-row button:hover { background: #4f46e5; }

    /* ── Forms ── */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .form-field { display: flex; flex-direction: column; gap: 5px; }
    .form-field.full { grid-column: 1 / -1; }
    .form-field label { font-size: 0.72rem; color: var(--text-muted); font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; }
    .form-field input,
    .form-field select {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius-xs); color: var(--text);
      padding: 10px 12px; font-size: 0.9rem; outline: none;
      transition: border-color 0.15s;
      -webkit-appearance: none; appearance: none;
    }
    .form-field input:focus, .form-field select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(99,102,241,0.1); }
    .form-field select option { background: #1e2a40; }

    .type-toggle { display: flex; gap: 8px; margin-bottom: 16px; }
    .type-btn {
      flex: 1; padding: 10px;
      border: 1.5px solid var(--border); border-radius: var(--radius-sm);
      background: transparent; color: var(--text-muted);
      font-size: 0.88rem; font-weight: 600; cursor: pointer; transition: all 0.15s;
    }
    .type-btn.active.expense { border-color: var(--expense); color: var(--expense); background: var(--expense-bg); }
    .type-btn.active.income  { border-color: var(--income);  color: var(--income);  background: var(--income-bg); }

    .primary-btn {
      width: 100%; margin-top: 14px; padding: 12px;
      background: linear-gradient(135deg, var(--accent), #4f46e5);
      color: white; border: none; border-radius: var(--radius-sm);
      font-size: 0.95rem; font-weight: 600; cursor: pointer;
      transition: opacity 0.15s; letter-spacing: 0.01em;
    }
    .primary-btn:hover { opacity: 0.9; }
    .primary-btn:active { opacity: 0.8; }

    hr.divider { border: none; border-top: 1px solid var(--border); margin: 14px 0; }

    /* ── Filters ── */
    .filter-bar { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
    .filter-bar select, .filter-bar input[type="month"] {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-xs); color: var(--text);
      padding: 8px 10px; font-size: 0.82rem; outline: none; flex: 1; min-width: 100px;
      -webkit-appearance: none; appearance: none;
    }
    .filter-bar select:focus, .filter-bar input[type="month"]:focus { border-color: var(--accent); }
    .filter-clear {
      padding: 8px 12px; background: var(--surface2);
      border: 1px solid var(--border); border-radius: var(--radius-xs);
      color: var(--text-muted); font-size: 0.78rem; cursor: pointer;
    }
    .filter-clear:hover { color: var(--text); }

    /* ── Transaction list ── */
    .tx-list-header {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 10px;
    }
    .tx-list-header span { font-size: 0.75rem; color: var(--text-muted); }
    .tx-list-header h3 {
      font-size: 0.78rem; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.06em;
    }

    .tx-list { display: flex; flex-direction: column; gap: 6px; }
    .tx-item {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 12px 14px;
      display: grid; grid-template-columns: 40px 1fr auto;
      align-items: center; gap: 10px; transition: border-color 0.15s;
    }
    .tx-item:hover { border-color: var(--border-light); }
    .tx-icon {
      width: 40px; height: 40px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; flex-shrink: 0;
    }
    .tx-icon.income  { background: var(--income-bg); }
    .tx-icon.expense { background: var(--expense-bg); }
    .tx-desc {
      font-size: 0.88rem; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .tx-meta { font-size: 0.72rem; color: var(--text-muted); margin-top: 3px; }
    .tx-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
    .tx-amount { font-size: 0.92rem; font-weight: 700; }
    .tx-amount.income  { color: var(--income); }
    .tx-amount.expense { color: var(--expense); }
    .tx-del {
      background: none; border: none; color: var(--text-dim);
      cursor: pointer; font-size: 0.7rem; padding: 2px 4px;
      border-radius: 3px; transition: color 0.15s;
    }
    .tx-del:hover { color: var(--expense); }

    .empty-state { text-align: center; padding: 48px 20px; color: var(--text-muted); }
    .empty-state .e-icon { font-size: 2.5rem; margin-bottom: 10px; }
    .empty-state p { font-size: 0.85rem; }

    /* ── Bottom nav (tab bar) ── */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--surface); border-top: 1px solid var(--border);
      display: flex; z-index: 200; padding-bottom: env(safe-area-inset-bottom);
    }
    .bottom-tab {
      flex: 1; padding: 10px 4px 12px; background: none; border: none;
      color: var(--text-dim); font-size: 0.62rem; font-weight: 600;
      cursor: pointer; display: flex; flex-direction: column;
      align-items: center; gap: 4px; letter-spacing: 0.03em;
      text-transform: uppercase; transition: color 0.15s;
    }
    .bottom-tab .nav-icon { font-size: 1.3rem; line-height: 1; }
    .bottom-tab.active { color: var(--accent2); }

    /* ── Misc ── */
    .section-title {
      font-size: 0.78rem; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.06em;
      margin-bottom: 12px; margin-top: 4px;
    }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      z-index: 300; align-items: flex-end; justify-content: center;
    }
    .modal-overlay.is-open { display: flex; }
    .modal-box {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius) var(--radius) 0 0;
      padding: 20px; width: 100%; max-width: 480px;
      max-height: 90vh; overflow-y: auto;
      padding-bottom: calc(20px + env(safe-area-inset-bottom));
    }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 4px;
    }
    .modal-header h3 { font-size: 1rem; font-weight: 700; }
    .modal-secondary-btn {
      width: 100%; margin-top: 8px; padding: 11px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text-muted);
      font-size: 0.88rem; font-weight: 600; cursor: pointer;
    }
    .modal-secondary-btn:hover { color: var(--text); }

    /* ── Pace cards ── */
    .pace-row { display: flex; gap: 10px; margin-bottom: 14px; }
    .pace-card {
      flex: 1; background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px 16px;
    }
    .pace-card .pace-label {
      font-size: 0.7rem; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px;
    }
    .pace-card .pace-value { font-size: 1rem; font-weight: 700; }
    .pace-card .pace-sub { font-size: 0.72rem; color: var(--text-muted); margin-top: 3px; }
    .pace-card.ok  .pace-value { color: var(--income); }
    .pace-card.warn .pace-value { color: var(--warning); }
    .pace-card.bad .pace-value { color: var(--expense); }

    /* ── Last month ── */
    .lm-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }
    .lm-cell { background: var(--surface2); border-radius: var(--radius-sm); padding: 10px; text-align: center; }
    .lm-cell .lm-label { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
    .lm-cell .lm-val { font-size: 0.88rem; font-weight: 700; }
    .lm-cats { display: flex; flex-direction: column; gap: 6px; }
    .lm-cat-row { display: flex; justify-content: space-between; font-size: 0.82rem; }
    .lm-cat-row span:first-child { color: var(--text-muted); }
    .lm-cat-row span:last-child { font-weight: 600; }

    /* ── Limit pace line ── */
    .limit-pace { font-size: 0.72rem; color: var(--text-muted); margin-bottom: 8px; }

    /* ── Search input ── */
    .filter-bar input[type="text"] {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-xs); color: var(--text);
      padding: 8px 10px; font-size: 0.82rem; outline: none; flex: 2; min-width: 120px;
    }
    .filter-bar input[type="text"]:focus { border-color: var(--accent); }

    @media (max-width: 380px) {
      .form-grid { grid-template-columns: 1fr; }
      .form-field.full { grid-column: 1; }
    }
  </style>
</head>
<body>

<div class="app-header">
  <div class="header-top">
    <h1>Budget <span>฿</span></h1>
    <div class="header-actions">
      <button class="icon-btn" id="sync-btn" onclick="syncFromLine()" title="Sync from LINE bot">🤖 Sync</button>
      <button class="icon-btn" onclick="openSettings()" title="Sync settings">⚙</button>
      <button class="icon-btn" onclick="exportData()">⬇</button>
      <button class="icon-btn" onclick="document.getElementById('import-input').click()">⬆</button>
      <input type="file" id="import-input" accept=".json" style="display:none" onchange="importData(event)">
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchPage('overview')">Overview</button>
    <button class="tab" onclick="switchPage('fixed')">Fixed</button>
    <button class="tab" onclick="switchPage('budget')">Budget</button>
    <button class="tab" onclick="switchPage('txns')">History</button>
  </div>
</div>

<!-- ══ PAGE: Overview ══ -->
<div class="page active" id="page-overview">
  <div style="height:12px"></div>
  <div id="warnings-container"></div>
  <div class="dash-grid">
    <div class="dash-card balance-card">
      <span class="card-icon">💰</span>
      <div class="card-label">Balance</div>
      <div class="card-amount" id="balance">฿0</div>
      <div class="card-sub" id="balance-sub"></div>
    </div>
    <div class="dash-card savings-card">
      <span class="card-icon">🎯</span>
      <div class="card-label">Saved This Month</div>
      <div class="card-amount" id="saved-month">฿0</div>
      <div class="card-sub" id="saved-sub">No goal set</div>
      <div class="mini-bar"><div class="mini-bar-fill ok" id="savings-bar-fill" style="width:0%"></div></div>
    </div>
    <div class="dash-card income-card">

<script>
  /* ── Constants ─────────────────────────────────────────────────────────── */
  const EXPENSE_CATS = ['Food','Transport','Bills','Shopping','Entertainment','Health','Other'];
  const INCOME_CATS  = ['Salary','Freelance','Other'];
  const CATEGORIES   = { expense: EXPENSE_CATS, income: INCOME_CATS };
  const ICONS = { Food:'🍜', Transport:'🚗', Bills:'💡', Shopping:'🛍️', Entertainment:'🎬', Health:'🏥', Salary:'💼', Freelance:'💻', Other:'📦' };

  /* ── State ─────────────────────────────────────────────────────────────── */
  let currentType  = 'expense';
  let currentPage  = 'overview';
  let transactions = JSON.parse(localStorage.getItem('budget_txns')    || '[]');
  let fixedCosts   = JSON.parse(localStorage.getItem('budget_fixed')   || '[]');
  let budgetLimits = JSON.parse(localStorage.getItem('budget_limits')  || '{}');
  let paidFixed    = JSON.parse(localStorage.getItem('budget_paid')    || '{}');
  let savingsGoal  = parseFloat(localStorage.getItem('budget_goal')    || '0');
  let monthHistory = JSON.parse(localStorage.getItem('budget_history') || '{}');

  const save        = () => localStorage.setItem('budget_txns',    JSON.stringify(transactions));
  const saveFixed   = () => localStorage.setItem('budget_fixed',   JSON.stringify(fixedCosts));
  const saveLimits  = () => localStorage.setItem('budget_limits',  JSON.stringify(budgetLimits));
  const savePaid    = () => localStorage.setItem('budget_paid',    JSON.stringify(paidFixed));
  const saveGoal    = () => localStorage.setItem('budget_goal',    savingsGoal);
  const saveHistory = () => localStorage.setItem('budget_history', JSON.stringify(monthHistory));

  /* ── Helpers ───────────────────────────────────────────────────────────── */
  const fmt      = n => new Intl.NumberFormat('th-TH',{style:'currency',currency:'THB',maximumFractionDigits:0}).format(n);
  const thisMonth= () => new Date().toISOString().slice(0,7);
  const escHtml  = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

  const monthSpend   = (cat,mo) => transactions.filter(t=>t.type==='expense'&&t.category===cat&&t.date.startsWith(mo)).reduce((s,t)=>s+t.amount,0);
  const monthIncome  = mo => transactions.filter(t=>t.type==='income' &&t.date.startsWith(mo)).reduce((s,t)=>s+t.amount,0);
  const monthExpense = mo => transactions.filter(t=>t.type==='expense'&&t.date.startsWith(mo)).reduce((s,t)=>s+t.amount,0);
  const fixedTotal   = () => fixedCosts.reduce((s,f)=>s+f.amount,0);
  const isPaid       = (id,mo) => !!paidFixed[id+':'+mo];

  /* ── Navigation ────────────────────────────────────────────────────────── */
  function switchPage(page) {
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.bottom-tab').forEach(t=>t.classList.remove('active'));
    document.getElementById('page-'+page).classList.add('active');
    document.querySelectorAll('.tab')[['overview','fixed','budget','txns'].indexOf(page)].classList.add('active');
    document.getElementById('nav-'+page).classList.add('active');
    currentPage = page;
    render();
  }

  /* ── Block toggles ─────────────────────────────────────────────────────── */
  function toggleBlock(id) {
    const body    = document.getElementById(id+'-body');
    const chevron = document.getElementById(id+'-chevron');
    const open    = body.classList.toggle('open');
    if (chevron) chevron.classList.toggle('open', open);
  }

  /* ── Type toggle ───────────────────────────────────────────────────────── */
  function setType(type) {
    currentType = type;
    document.getElementById('btn-expense').classList.toggle('active', type==='expense');
    document.getElementById('btn-income').classList.toggle('active',  type==='income');
    populateCats('f-category', CATEGORIES[type]);
  }

  function populateCats(id, cats) {
    document.getElementById(id).innerHTML = cats.map(c=>`<option value="${c}">${c}</option>`).join('');
  }

  /* ── Transactions ──────────────────────────────────────────────────────── */
  function addTransaction() {
    const amount = parseFloat(document.getElementById('f-amount').value);
    const date   = document.getElementById('f-date').value;
    const cat    = document.getElementById('f-category').value;
    const desc   = document.getElementById('f-desc').value.trim();

    if (!amount || amount <= 0) { alert('Enter a valid amount.'); return; }
    if (!date) { alert('Select a date.'); return; }

    if (currentType === 'expense' && budgetLimits[cat]) {
      const mo    = date.slice(0,7);
      const spent = monthSpend(cat, mo);
      const limit = budgetLimits[cat];
      if (spent + amount > limit) {
        const ok = confirm(`⚠️ This pushes ${cat} to ${fmt(spent+amount)}, over your ${fmt(limit)} limit. Add anyway?`);
        if (!ok) return;
      }
    }

    transactions.unshift({ id: crypto.randomUUID(), type: currentType, amount, category: cat, description: desc||cat, date });
    save(); render();
    document.getElementById('f-amount').value = '';
    document.getElementById('f-desc').value   = '';
  }

  function deleteTransaction(id) {
    if (!confirm('Remove this transaction?')) return;
    transactions = transactions.filter(t=>t.id!==id);
    save(); render();
  }

  /* ── Fixed Costs ───────────────────────────────────────────────────────── */
  function addFixed() {
    const name   = document.getElementById('fc-name').value.trim();
    const amount = parseFloat(document.getElementById('fc-amount').value);
    const due    = parseInt(document.getElementById('fc-due').value) || null;
    const cat    = document.getElementById('fc-category').value;
    if (!name)               { alert('Enter a name.'); return; }
    if (!amount || amount<=0){ alert('Enter a valid amount.'); return; }
    fixedCosts.push({ id: crypto.randomUUID(), name, amount, category: cat, due });
    saveFixed(); render();
    document.getElementById('fc-name').value   = '';
    document.getElementById('fc-amount').value = '';
    document.getElementById('fc-due').value    = '';
  }

  function deleteFixed(id) {
    if (!confirm('Remove this fixed cost?')) return;
    fixedCosts = fixedCosts.filter(f=>f.id!==id);
    // clean paid entries for deleted item
    Object.keys(paidFixed).forEach(k=>{ if(k.startsWith(id+':')) delete paidFixed[k]; });
    saveFixed(); savePaid(); render();
  }

  /* ── Last month snapshot ───────────────────────────────────────────────── */
  function snapshotLastMonth() {
    const now = new Date();
    const lm  = new Date(now.getFullYear(), now.getMonth() - 1, 1);
    const lastMo = lm.toISOString().slice(0, 7);
    if (monthHistory[lastMo]) return;
    const inc = monthIncome(lastMo);
    const exp = monthExpense(lastMo);
    if (inc === 0 && exp === 0) return;
    const cats = {};
    EXPENSE_CATS.forEach(cat => { const s = monthSpend(cat, lastMo); if (s > 0) cats[cat] = s; });
    monthHistory[lastMo] = { income: inc, expenses: exp, saved: Math.max(0, inc - exp), categories: cats };
    saveHistory();
  }

  /* ── Render: pace cards ─────────────────────────────────────────────────── */
  function renderPace() {
    const mo  = thisMonth();
    const now = new Date();
    const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
    const daysPassed  = now.getDate();
    const daysLeft    = Math.max(1, daysInMonth - daysPassed);
    const mInc = monthIncome(mo);
    const mExp = monthExpense(mo);

    const paceRow = document.getElementById('pace-row');
    if (mInc === 0) { paceRow.style.display = 'none'; return; }
    paceRow.style.display = 'flex';

    // Left per day
    const spendableBudget = savingsGoal > 0 ? mInc - savingsGoal : mInc;
    const leftToSpend     = Math.max(0, spendableBudget - mExp);
    const leftPerDay      = Math.round(leftToSpend / daysLeft);
    const dailyCard       = document.getElementById('pace-daily-card');
    document.getElementById('pace-daily-val').textContent = fmt(leftPerDay);
    document.getElementById('pace-daily-sub').textContent = `${daysLeft} days left this month`;
    dailyCard.className = 'pace-card ' + (leftToSpend >= 0 ? 'ok' : 'bad');

    // Projected savings
    const dailyRate      = daysPassed > 0 ? mExp / daysPassed : 0;
    const projectedExp   = dailyRate * daysInMonth;
    const projectedSaved = Math.max(0, mInc - projectedExp);
    const trackCard      = document.getElementById('pace-track-card');
    document.getElementById('pace-track-val').textContent = fmt(projectedSaved);
    if (savingsGoal > 0) {
      const diff = projectedSaved - savingsGoal;
      document.getElementById('pace-track-sub').textContent = diff >= 0 ? 'On track ✅' : `฿${fmt(Math.abs(diff))} short ⚠️`;
      trackCard.className = 'pace-card ' + (diff >= 0 ? 'ok' : 'warn');
    } else {
      document.getElementById('pace-track-sub').textContent = 'Projected this month';
      trackCard.className = 'pace-card ok';
    }
  }

  /* ── Render: last month ─────────────────────────────────────────────────── */
  function renderLastMonth() {
    const now    = new Date();
    const lm     = new Date(now.getFullYear(), now.getMonth() - 1, 1);
    const lastMo = lm.toISOString().slice(0, 7);
    const data   = monthHistory[lastMo];
    const block  = document.getElementById('last-month-block');
    if (!data) { block.style.display = 'none'; return; }
    block.style.display = 'block';

    document.getElementById('lastmo-meta').textContent =
      lm.toLocaleDateString('en-GB', { month: 'long', year: 'numeric' });

    document.getElementById('lastmo-grid').innerHTML = `
      <div class="lm-cell">
        <div class="lm-label">Income</div>
        <div class="lm-val" style="color:var(--income)">${fmt(data.income)}</div>
      </div>
      <div class="lm-cell">
        <div class="lm-label">Spent</div>
        <div class="lm-val" style="color:var(--expense)">${fmt(data.expenses)}</div>
      </div>
      <div class="lm-cell">
        <div class="lm-label">Saved</div>
        <div class="lm-val" style="color:${data.saved > 0 ? 'var(--income)' : 'var(--expense)'}">${fmt(data.saved)}</div>
      </div>`;

    const sorted = Object.entries(data.categories || {}).sort((a,b) => b[1]-a[1]).slice(0, 4);
    document.getElementById('lastmo-cats').innerHTML = sorted.map(([cat, amt]) => `
      <div class="lm-cat-row">
        <span>${ICONS[cat]||'📦'} ${cat}</span>
        <span>${fmt(amt)}</span>
      </div>`).join('');
  }

  function pruneOldPaid() {
    const cutoff = new Date();
    cutoff.setMonth(cutoff.getMonth() - 3);
    const cutoffStr = cutoff.toISOString().slice(0, 7);
    let changed = false;
    Object.keys(paidFixed).forEach(k => {
      const mo = k.slice(-7);
      if (mo < cutoffStr) { delete paidFixed[k]; changed = true; }
    });
    if (changed) savePaid();
  }

  function togglePaid(id) {
    const mo    = thisMonth();
    const key   = id+':'+mo;
    const autoId = 'auto:'+id+':'+mo;
    if (paidFixed[key]) {
      delete paidFixed[key];
      transactions = transactions.filter(t => t.id !== autoId);
      save();
    } else {
      paidFixed[key] = true;
      const f = fixedCosts.find(fc => fc.id === id);
      if (f) {
        transactions.unshift({
          id: autoId,
          type: 'expense', amount: f.amount, category: f.category,
          description: f.name, date: new Date().toISOString().slice(0,10),
          source: 'fixed-cost'
        });
        transactions.sort((a,b) => b.date.localeCompare(a.date));
        save();
      }
    }
    savePaid(); render();
  }

  /* ── Budget Limits ─────────────────────────────────────────────────────── */
  function setLimit(cat) {
    const val = parseFloat(document.getElementById('limit-input-'+cat).value);
    if (!val || val<=0) delete budgetLimits[cat];
    else budgetLimits[cat] = val;
    saveLimits(); render();
  }

  function setSavingsGoal() {
    savingsGoal = parseFloat(document.getElementById('savings-goal-input').value) || 0;
    saveGoal(); render();
  }

  /* ── Filters ───────────────────────────────────────────────────────────── */
  function onTypeFilterChange() {
    const type = document.getElementById('filter-type').value;
    const sel  = document.getElementById('filter-cat');
    sel.innerHTML = '<option value="all">All cats</option>';
    if (type!=='all') CATEGORIES[type].forEach(c => sel.innerHTML += `<option value="${c}">${c}</option>`);
    render();
  }

  function clearFilters() {
    document.getElementById('filter-month').value  = '';
    document.getElementById('filter-type').value   = 'all';
    document.getElementById('filter-search').value = '';
    document.getElementById('filter-cat').innerHTML = '<option value="all">All cats</option>';
    render();
  }

  function applyFilters() {
    const month  = document.getElementById('filter-month').value;
    const type   = document.getElementById('filter-type').value;
    const cat    = document.getElementById('filter-cat').value;
    const search = document.getElementById('filter-search').value.toLowerCase().trim();
    return transactions.filter(t => {
      if (month && !t.date.startsWith(month)) return false;
      if (type!=='all' && t.type!==type) return false;
      if (cat!=='all'  && t.category!==cat) return false;
      if (search && !t.description.toLowerCase().includes(search) && !t.category.toLowerCase().includes(search)) return false;
      return true;
    });
  }

  /* ── Render ────────────────────────────────────────────────────────────── */
  function renderDashboard() {
    const income   = transactions.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
    const expenses = transactions.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
    const balance  = income - expenses;
    const mo       = thisMonth();
    const unpaidFixed = fixedCosts.filter(f=>!isPaid(f.id,mo)).reduce((s,f)=>s+f.amount,0);
    const balAfter = balance - unpaidFixed;

    document.getElementById('total-income').textContent   = fmt(income);
    document.getElementById('total-expenses').textContent = fmt(expenses);
    document.getElementById('balance').textContent        = fmt(unpaidFixed>0 ? balAfter : balance);
    document.getElementById('balance-sub').textContent    = unpaidFixed>0 ? `Before unpaid fixed: ${fmt(balance)}` : '';

    const mInc  = monthIncome(mo);
    const mExp  = monthExpense(mo);
    const saved = mInc > 0 ? Math.max(0, mInc - mExp) : 0;
    const savedEl = document.getElementById('saved-month');
    savedEl.textContent = fmt(saved);
    savedEl.className   = 'card-amount'+(savingsGoal>0&&saved<savingsGoal&&mInc>0?' behind':'');

    const barFill = document.getElementById('savings-bar-fill');
    if (savingsGoal > 0 && mInc > 0) {
      const pct = Math.min(100, Math.max(0, (saved/savingsGoal)*100));
      document.getElementById('saved-sub').textContent = `Goal: ${fmt(savingsGoal)} · ${Math.round(pct)}%`;
      barFill.style.width = pct+'%';
      barFill.className   = 'mini-bar-fill '+(saved<savingsGoal?'behind':'ok');
    } else if (mInc === 0) {
      document.getElementById('saved-sub').textContent = 'Add income to track savings';
      barFill.style.width = '0%';
      barFill.className   = 'mini-bar-fill ok';
    } else {
      document.getElementById('saved-sub').textContent = 'No goal set';
      barFill.style.width = '0%';
      barFill.className   = 'mini-bar-fill ok';
    }
  }

  function renderWarnings() {
    const mo  = thisMonth();
    const day = new Date().getDate();
    const html = [];

    // Unpaid fixed costs overdue
    fixedCosts.forEach(f => {
      if (!isPaid(f.id, mo) && f.due && day > f.due) {
        html.push(`<div class="warn-item red">🚨 <b>${escHtml(f.name)}</b> (due day ${f.due}) is unpaid — ${fmt(f.amount)}</div>`);
      }
    });

    EXPENSE_CATS.forEach(cat => {
      if (!budgetLimits[cat]) return;
      const spent = monthSpend(cat, mo);
      const limit = budgetLimits[cat];
      const pct   = spent / limit;
      if (pct >= 1)
        html.push(`<div class="warn-item red">🚨 <b>${cat}</b> over budget — ${fmt(spent)} / ${fmt(limit)}</div>`);
      else if (pct >= 0.8)
        html.push(`<div class="warn-item yellow">⚠️ <b>${cat}</b> at ${Math.round(pct*100)}% of ${fmt(limit)} budget</div>`);
    });

    document.getElementById('warnings-container').innerHTML = html.join('');
  }

  function renderFixed() {
    const mo      = thisMonth();
    const paidCt  = fixedCosts.filter(f=>isPaid(f.id, mo)).length;
    const total   = fixedCosts.length;
    const paidAmt = fixedCosts.filter(f=>isPaid(f.id,mo)).reduce((s,f)=>s+f.amount,0);
    const unpaidAmt = fixedTotal() - paidAmt;

    // Progress bar
    const progressEl = document.getElementById('fixed-progress-bar');
    if (total > 0) {
      const dots = fixedCosts.map(f=>`<div class="fixed-dot${isPaid(f.id,mo)?' paid':''}"></div>`).join('');
      progressEl.innerHTML = `
        <div class="fixed-progress">
          <div class="fixed-progress-dots">${dots}</div>
          <span class="fixed-progress-label">${paidCt}/${total} paid · ${fmt(unpaidAmt)} left</span>
        </div>`;
    } else {
      progressEl.innerHTML = '';
    }

    const el = document.getElementById('fixed-list');
    if (fixedCosts.length === 0) {
      el.innerHTML = `<div class="empty-state"><div class="e-icon">📌</div><p>No fixed costs yet.<br>Add rent, loans, subscriptions…</p></div>`;
      return;
    }

    // Sort: unpaid first, then paid
    const sorted = [...fixedCosts].sort((a,b) => {
      const ap = isPaid(a.id,mo), bp = isPaid(b.id,mo);
      if (ap !== bp) return ap ? 1 : -1;
      return (a.due||99) - (b.due||99);
    });

    el.innerHTML = sorted.map(f => {
      const paid   = isPaid(f.id, mo);
      const dueStr = f.due ? `· Due day ${f.due}` : '';
      return `
        <div class="fixed-item${paid?' paid-item':''}">
          <div class="fixed-item-icon">${ICONS[f.category]||'📦'}</div>
          <div class="fixed-item-info">
            <div class="fixed-item-name">${escHtml(f.name)}</div>
            <div class="fixed-item-cat">${f.category} ${dueStr}</div>
          </div>
          <div class="fixed-item-right">
            <span class="fixed-amount">−${fmt(f.amount)}</span>
            <button class="pay-btn ${paid?'is-paid':'unpaid'}" onclick="togglePaid('${f.id}')">
              ${paid ? '✓ Paid' : 'Pay'}
            </button>
            <button class="del-btn" onclick="deleteFixed('${f.id}')">✕</button>
          </div>
        </div>`;
    }).join('');
  }

  function renderLimits() {
    const mo          = thisMonth();
    const now         = new Date();
    const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
    const daysLeft    = Math.max(1, daysInMonth - now.getDate());
    document.getElementById('limits-list').innerHTML = EXPENSE_CATS.map(cat => {
      const spent = monthSpend(cat, mo);
      const limit = budgetLimits[cat] || 0;
      const pct   = limit > 0 ? Math.min(100, (spent/limit)*100) : 0;
      const cls   = pct>=100?'over':pct>=80?'warn':'ok';
      const clr   = pct>=100?'var(--expense)':pct>=80?'var(--warning)':'var(--text)';
      const left  = limit > 0 ? limit - spent : 0;
      const pace  = limit > 0 ? `<div class="limit-pace">${fmt(Math.max(0,left))} left · ฿${Math.round(Math.max(0,left)/daysLeft).toLocaleString()}/day remaining</div>` : '';
      return `
        <div class="limit-item">
          <div class="limit-row">
            <span class="limit-label">${ICONS[cat]||'📦'} ${cat}</span>
            <span class="limit-nums">
              <span style="color:${clr};font-weight:700">${fmt(spent)}</span>
              ${limit>0?`<span style="color:var(--text-muted)"> / ${fmt(limit)}</span>`:''}
            </span>
          </div>
          ${limit>0?`<div class="limit-bar"><div class="limit-bar-fill ${cls}" style="width:${pct}%"></div></div>`:''}
          ${pace}
          <div class="limit-input-row">
            <input type="number" id="limit-input-${cat}" placeholder="Monthly limit (฿)" value="${limit||''}" min="0" inputmode="numeric">
            <button class="set-btn" onclick="setLimit('${cat}')">Set</button>
          </div>
        </div>`;
    }).join('');

    if (savingsGoal > 0) document.getElementById('savings-goal-input').value = savingsGoal;
  }

  function renderList(filtered) {
    const el = document.getElementById('tx-list');
    document.getElementById('tx-count').textContent = `${filtered.length} item${filtered.length!==1?'s':''}`;
    if (filtered.length === 0) {
      el.innerHTML = `<div class="empty-state"><div class="e-icon">💸</div><p>No transactions found</p></div>`;
      return;
    }
    el.innerHTML = filtered.map(t=>{
      const icon    = ICONS[t.category]||'📦';
      const sign    = t.type==='income'?'+':'−';
      const dateStr = new Date(t.date+'T00:00:00').toLocaleDateString('en-GB',{day:'2-digit',month:'short'});
      const srcTag  = t.source==='fixed-cost' ? ' · 📌' : t.source==='line-bot' ? ' · 🤖' : '';
      return `
        <div class="tx-item">
          <div class="tx-icon ${t.type}">${icon}</div>
          <div>
            <div class="tx-desc">${escHtml(t.description)}</div>
            <div class="tx-meta">${t.category} · ${dateStr}${srcTag}</div>
          </div>
          <div class="tx-right">
            <span class="tx-amount ${t.type}">${sign}${fmt(t.amount)}</span>
            <div style="display:flex;gap:4px">
              <button class="tx-del" onclick="openEdit('${t.id}')" title="Edit">✏</button>
              <button class="tx-del" onclick="deleteTransaction('${t.id}')" title="Delete">✕</button>
            </div>
          </div>
        </div>`;
    }).join('');
  }

  function render() {
    renderDashboard();
    renderWarnings();
    if (currentPage === 'fixed')   { renderFixed(); }
    if (currentPage === 'budget')  { renderLimits(); }
    if (currentPage === 'txns')    { renderList(applyFilters()); }
    if (currentPage === 'overview'){ renderFixed(); renderPace(); renderLastMonth(); }
  }

  /* ── Export / Import ───────────────────────────────────────────────────── */
  function exportData() {
    const data = { transactions, fixedCosts, budgetLimits, paidFixed, savingsGoal, monthHistory };
    const blob = new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `budget-backup-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
  }

  function importData(e) {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const d = JSON.parse(ev.target.result);
        const incoming = Array.isArray(d) ? d : (d.transactions || []);
        const existing = new Set(transactions.map(t=>t.id));
        incoming.forEach(t=>{ if(!existing.has(t.id)) transactions.unshift(t); });
        transactions.sort((a,b)=>b.date.localeCompare(a.date));
        if (!Array.isArray(d)) {
          if (d.fixedCosts)   { fixedCosts = d.fixedCosts;     saveFixed(); }
          if (d.budgetLimits) { budgetLimits = d.budgetLimits; saveLimits(); }
          if (d.paidFixed)    { paidFixed = d.paidFixed;       savePaid(); }
          if (d.savingsGoal)  { savingsGoal = d.savingsGoal;   saveGoal(); }
          if (d.monthHistory) { monthHistory = d.monthHistory; saveHistory(); }
        }
        save(); render();
        alert(`Imported — ${incoming.length} transactions merged.`);
      } catch { alert('Invalid file.'); }
    };
    reader.readAsText(file);
    e.target.value = '';
  }

  /* ── Edit Transaction Modal ────────────────────────────────────────────── */
  let editingId = null;
  let editType  = 'expense';

  function openEdit(id) {
    const t = transactions.find(tx => tx.id === id);
    if (!t) return;
    editingId = id;
    editType  = t.type;
    document.getElementById('edit-btn-expense').classList.toggle('active', t.type === 'expense');
    document.getElementById('edit-btn-income').classList.toggle('active',  t.type === 'income');
    document.getElementById('edit-amount').value = t.amount;
    document.getElementById('edit-date').value   = t.date;
    document.getElementById('edit-desc').value   = t.description;
    populateCats('edit-category', CATEGORIES[t.type]);
    document.getElementById('edit-category').value = t.category;
    document.getElementById('modal-overlay').classList.add('is-open');
  }

  function setEditType(type) {
    editType = type;
    document.getElementById('edit-btn-expense').classList.toggle('active', type === 'expense');
    document.getElementById('edit-btn-income').classList.toggle('active',  type === 'income');
    populateCats('edit-category', CATEGORIES[type]);
  }

  function saveEdit() {
    const amount = parseFloat(document.getElementById('edit-amount').value);
    const date   = document.getElementById('edit-date').value;
    const cat    = document.getElementById('edit-category').value;
    const desc   = document.getElementById('edit-desc').value.trim();
    if (!amount || amount <= 0) { alert('Enter a valid amount.'); return; }
    if (!date) { alert('Select a date.'); return; }
    const idx = transactions.findIndex(t => t.id === editingId);
    if (idx === -1) return;
    transactions[idx] = { ...transactions[idx], type: editType, amount, category: cat, description: desc||cat, date };
    transactions.sort((a,b) => b.date.localeCompare(a.date));
    save(); render();
    closeModal();
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('is-open');
    editingId = null;
  }

  /* ── Settings Modal ─────────────────────────────────────────────────────── */
  function openSettings() {
    document.getElementById('settings-url').value    = localStorage.getItem('budget_sync_url')    || '';
    document.getElementById('settings-secret').value = localStorage.getItem('budget_sync_secret') || '';
    document.getElementById('settings-overlay').classList.add('is-open');
  }

  function saveSettings() {
    const url    = document.getElementById('settings-url').value.trim();
    const secret = document.getElementById('settings-secret').value.trim();
    if (url)    localStorage.setItem('budget_sync_url',    url);
    else        localStorage.removeItem('budget_sync_url');
    if (secret) localStorage.setItem('budget_sync_secret', secret);
    else        localStorage.removeItem('budget_sync_secret');
    closeSettings();
    showToast('Sync settings saved');
  }

  function closeSettings() {
    document.getElementById('settings-overlay').classList.remove('is-open');
  }

  /* ── LINE Sync ─────────────────────────────────────────────────────────── */
  async function syncFromLine(silent) {
    const url    = localStorage.getItem('budget_sync_url');
    const secret = localStorage.getItem('budget_sync_secret');
    if (!url || !secret) {
      openSettings();
      showToast('Configure your sync settings first', true);
      return;
    }
    const btn = document.getElementById('sync-btn');
    btn.textContent = '⏳ Syncing…'; btn.disabled = true;
    try {
      const res  = await fetch(url, { headers: { 'x-sync-secret': secret } });
      if (!res.ok) throw new Error('Auth failed');
      const data = await res.json();
      const incoming = data.transactions || [];
      if (incoming.length === 0) {
        if (!silent) showToast('No new transactions from LINE 👌');
      } else {
        const existing = new Set(transactions.map(t=>t.id));
        incoming.forEach(t=>{ if(!existing.has(t.id)) transactions.unshift(t); });
        transactions.sort((a,b)=>b.date.localeCompare(a.date));
        save(); render();
        // Clear the queue
        await fetch(url, { method: 'DELETE', headers: { 'x-sync-secret': secret } });
        showToast(`🤖 ${incoming.length} transaction${incoming.length>1?'s':''} synced from LINE!`);
      }
    } catch(e) {
      if (!silent) showToast('Sync failed — check your URL and secret ❌', true);
    }
    btn.textContent = '🤖 Sync'; btn.disabled = false;
  }

  function showToast(msg, err) {
    let t = document.getElementById('toast');
    if (!t) {
      t = document.createElement('div');
      t.id = 'toast';
      t.style.cssText = `position:fixed;bottom:90px;left:50%;transform:translateX(-50%);
        background:${err?'#f43f5e':'#22c55e'};color:white;padding:10px 20px;border-radius:20px;
        font-size:0.85rem;font-weight:600;z-index:999;white-space:nowrap;
        box-shadow:0 4px 20px rgba(0,0,0,0.4);transition:opacity 0.3s;`;
      document.body.appendChild(t);
    }
    t.style.background = err ? '#f43f5e' : '#22c55e';
    t.textContent = msg;
    t.style.opacity = '1';
    clearTimeout(t._timer);
    t._timer = setTimeout(()=>{ t.style.opacity='0'; }, 3000);
  }

  // Auto-sync silently on load if configured
  if (localStorage.getItem('budget_sync_url') && localStorage.getItem('budget_sync_secret')) {
    setTimeout(() => syncFromLine(true), 1000);
  }

  /* ── Init ──────────────────────────────────────────────────────────────── */
  pruneOldPaid();
  snapshotLastMonth();
  document.getElementById('f-date').value = new Date().toISOString().slice(0,10);
  populateCats('f-category', CATEGORIES.expense);
  render();
</script>
</body>
